<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Blast 6×6 — ITSpecta</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    :root{
      --purple:#7c3aed;--pink:#db2777;--cyan:#06b6d4;
      --bg:#07071a;--glass:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;margin:0;padding:0;}
    body{background:var(--bg);color:#fff;overflow-x:hidden;}

    /* BG */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.18;animation:drift 25s infinite alternate;}
    .orb1{width:700px;height:700px;background:radial-gradient(#7c3aed,#4f46e5);top:-20%;left:-10%;animation-delay:0s;}
    .orb2{width:600px;height:600px;background:radial-gradient(#db2777,#9333ea);bottom:-15%;right:-10%;animation-delay:-8s;}
    .orb3{width:400px;height:400px;background:radial-gradient(#06b6d4,#3b82f6);top:40%;left:50%;animation-delay:-16s;}
    @keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(60px,40px) scale(1.15);}}

    /* NAV */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:999;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,26,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--gb);}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--purple),var(--pink));border-radius:10px;display:flex;align-items:center;justify-content:center;}
    .nav-links{display:flex;gap:24px;list-style:none;}
    .nav-links a{color:rgba(255,255,255,0.6);text-decoration:none;font-weight:700;font-size:14px;transition:.2s;}
    .nav-links a:hover,.nav-links a.active{color:#fff;}
    .btn-back{padding:8px 20px;border:1px solid var(--gb);border-radius:100px;background:var(--glass);color:#fff;text-decoration:none;font-weight:700;font-size:13px;transition:.3s;}
    .btn-back:hover{background:rgba(255,255,255,0.1);}

    /* OVERLAY */
    .overlay{position:fixed;inset:0;z-index:3000;background:radial-gradient(ellipse at center,#0d0d2b 0%,#030310 100%);display:flex;align-items:center;justify-content:center;padding:20px;transition:.8s cubic-bezier(.4,0,.2,1);}
    .overlay.hidden{opacity:0;pointer-events:none;transform:scale(1.05);filter:blur(20px);}
    .lobby{display:flex;gap:28px;max-width:980px;width:100%;align-items:stretch;}
    .lobby-card{flex:1.4;background:rgba(255,255,255,0.03);border:1px solid var(--gb);border-radius:36px;padding:52px 48px;backdrop-filter:blur(40px);display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden;}
    .lobby-card::before{content:'';position:absolute;inset:-1px;border-radius:36px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(219,39,119,.3),rgba(6,182,212,.2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:1px;pointer-events:none;}
    .badge{display:inline-block;padding:6px 18px;border-radius:100px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);font-size:11px;font-weight:800;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
    .lobby-title{font-size:52px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#fff 30%,#a78bfa 70%,#f472b6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:8px;}
    .lobby-sub{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:36px;}
    .input-wrap{width:100%;text-align:left;margin-bottom:28px;}
    .input-label{font-size:11px;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:2px;display:block;margin-bottom:10px;}
    .form-input{width:100%;background:rgba(0,0,0,.4);border:2px solid var(--gb);color:#fff;padding:18px 20px;border-radius:18px;outline:none;font-size:18px;font-weight:800;text-align:center;transition:.3s;}
    .form-input:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(124,58,237,.2);}
    .form-input.shake-inp{animation:shakeI .4s ease;}
    @keyframes shakeI{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
    .btn-start{width:100%;padding:22px;border:none;border-radius:18px;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-size:16px;font-weight:900;letter-spacing:1px;cursor:pointer;transition:.3s;box-shadow:0 20px 50px rgba(124,58,237,.4);}
    .btn-start:hover{transform:translateY(-3px);box-shadow:0 28px 60px rgba(124,58,237,.5);}
    .btn-start:active{transform:translateY(0);}

    .lb-panel{width:320px;background:rgba(255,255,255,.02);border:1px solid var(--gb);border-radius:28px;padding:28px;display:flex;flex-direction:column;backdrop-filter:blur(20px);}
    .lb-title{font-weight:800;font-size:16px;margin-bottom:20px;display:flex;align-items:center;gap:8px;padding-bottom:16px;border-bottom:1px solid var(--gb);}
    .lb-list{display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:380px;}
    .lb-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:14px;font-size:14px;font-weight:700;border:1px solid transparent;}
    .lb-row.top{border-color:rgba(124,58,237,.3);background:linear-gradient(90deg,rgba(124,58,237,.12),transparent);}
    .lb-score{color:#a78bfa;font-weight:900;}
    .lb-empty{text-align:center;padding:20px;color:rgba(255,255,255,.3);font-size:13px;}

    /* GAME AREA */
    #gameArea{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:90px 16px 40px;z-index:1;}
    #particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:10;}
    #lineFlash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:8;transition:opacity .3s;}

    /* GAME LAYOUT */
    .game-wrap{display:flex;gap:32px;width:100%;max-width:1050px;justify-content:center;align-items:flex-start;z-index:20;}

    /* SCORE BAR */
    .score-bar{width:100%;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid var(--gb);border-radius:20px;padding:14px 24px;backdrop-filter:blur(20px);}
    .score-left{display:flex;align-items:center;gap:12px;}
    .score-num{font-size:28px;font-weight:900;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .score-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:2px;}
    .score-right{display:flex;align-items:center;gap:10px;}
    #rankBadge{font-size:11px;font-weight:800;padding:5px 14px;background:rgba(219,39,119,.12);border:1px solid rgba(219,39,119,.3);border-radius:100px;color:#f9a8d4;}
    #dispName{font-weight:800;font-size:15px;}
    #comboBar{font-size:13px;font-weight:800;color:#facc15;min-height:20px;transition:.3s;}
    #feverBadge{display:none;align-items:center;gap:6px;padding:5px 14px;background:rgba(255,0,85,.15);border:1px solid rgba(255,0,85,.4);border-radius:100px;color:#ff4477;font-size:12px;font-weight:900;animation:pulse .5s infinite alternate;}
    @keyframes pulse{from{opacity:1;}to{opacity:.5;}}

    /* GRID */
    .board-wrap{position:relative;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:16px;}
    .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;background:rgba(255,255,255,.02);padding:16px;border-radius:28px;width:100%;aspect-ratio:1;border:1px solid var(--gb);box-shadow:0 40px 100px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);position:relative;backdrop-filter:blur(10px);transition:all .3s;}
    .grid.shake{animation:gridShake .4s ease;}
    @keyframes gridShake{0%,100%{transform:rotate(0);}20%{transform:rotate(-2deg) scale(1.02);}40%{transform:rotate(2deg) scale(1.02);}60%{transform:rotate(-1deg);}80%{transform:rotate(1deg);}}
    .fever #gameGrid{border-color:#ff0055 !important;box-shadow:0 0 60px rgba(255,0,85,.4),inset 0 0 30px rgba(255,0,85,.15),0 40px 100px rgba(0,0,0,.7) !important;animation:feverGrid .4s infinite alternate;}
    @keyframes feverGrid{from{filter:brightness(1);}to{filter:brightness(1.1) saturate(1.3);}}

    .cell{background:rgba(255,255,255,.04);border-radius:10px;transition:all .15s;position:relative;overflow:hidden;}
    .cell::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none;}
    .cell.filled{background:var(--cc,#7c3aed) !important;border:1px solid rgba(255,255,255,.3);box-shadow:inset 0 0 12px rgba(255,255,255,.25),0 4px 12px rgba(0,0,0,.4),0 0 16px var(--cc,#7c3aed)44;}
    .cell.preview{background:var(--cc,#7c3aed) !important;opacity:.55;transform:scale(.9);border:2px dashed rgba(255,255,255,.7);box-shadow:0 0 12px var(--cc,#7c3aed)66;}
    .cell.pop-in{animation:popIn .35s cubic-bezier(.175,.885,.32,1.275);}
    @keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0;}60%{transform:scale(1.15) rotate(3deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
    .cell.clearing{animation:clearOut .5s ease forwards;}
    @keyframes clearOut{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.8;filter:brightness(2);}100%{transform:scale(0);opacity:0;}}

    /* PIECES */
    .pieces-row{display:flex;gap:14px;justify-content:center;width:100%;margin-top:4px;}
    .piece-box{width:116px;height:116px;background:var(--glass);border:1px solid var(--gb);border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:grab;transition:.3s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;}
    .piece-box::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none;}
    .piece-box:hover{transform:translateY(-10px) scale(1.06);background:rgba(255,255,255,.07);border-color:rgba(124,58,237,.5);box-shadow:0 20px 40px rgba(0,0,0,.5),0 0 30px rgba(124,58,237,.2);}
    .piece-box:active{cursor:grabbing;}
    .piece-box.dragging{opacity:0;transform:scale(.95);}

    /* FEVER ALERT */
    .fever-alert{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:90px;font-weight:900;color:#ff0055;text-shadow:0 0 40px #ff005588,0 0 80px #ff005544;z-index:200;pointer-events:none;letter-spacing:-2px;font-style:italic;}
    .fever-alert.show{animation:feverPop 1.2s cubic-bezier(.175,.885,.32,1.275) forwards;}
    @keyframes feverPop{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0;}25%{transform:translate(-50%,-50%) scale(1.3) rotate(3deg);opacity:1;}80%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}100%{transform:translate(-50%,-50%) scale(2);opacity:0;}}

    /* SCORE POPUP */
    .pts-popup{position:absolute;font-size:28px;font-weight:900;pointer-events:none;animation:floatUp .9s ease forwards;z-index:50;transform:translateX(-50%);}
    @keyframes floatUp{0%{transform:translateX(-50%) translateY(0);opacity:1;}100%{transform:translateX(-50%) translateY(-80px);opacity:0;}}

    /* GHOST */
    #drag-ghost{position:fixed;pointer-events:none;z-index:5000;display:none;filter:drop-shadow(0 20px 50px rgba(0,0,0,.7));}

    /* GAME OVER */
    #gameOverModal{position:fixed;inset:0;background:rgba(3,3,20,.95);z-index:6000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(40px);}
    .go-card{max-width:420px;width:90%;background:rgba(10,10,30,.8);border:1px solid var(--gb);border-radius:36px;padding:48px;text-align:center;box-shadow:0 60px 120px rgba(0,0,0,.9);position:relative;overflow:hidden;}
    .go-card::before{content:'';position:absolute;inset:-1px;border-radius:36px;background:linear-gradient(135deg,rgba(124,58,237,.4),rgba(219,39,119,.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:1px;pointer-events:none;}
    .go-title{font-size:24px;font-weight:900;color:#f472b6;margin-bottom:4px;}
    .go-rank{font-size:14px;font-weight:800;color:#a78bfa;margin-bottom:24px;opacity:.8;}
    .go-score-box{background:rgba(255,255,255,.04);border-radius:24px;padding:28px;margin-bottom:28px;border:1px solid var(--gb);}
    .go-score-lbl{font-size:12px;color:rgba(255,255,255,.4);font-weight:700;margin-bottom:6px;letter-spacing:2px;}
    .go-score-num{font-size:64px;font-weight:900;line-height:1;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;}
    .btn-replay{width:100%;padding:20px;border:none;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-size:16px;font-weight:900;cursor:pointer;transition:.3s;letter-spacing:1px;box-shadow:0 16px 40px rgba(124,58,237,.4);}
    .btn-replay:hover{transform:translateY(-3px);box-shadow:0 24px 50px rgba(124,58,237,.5);}

    /* RESPONSIVE */
    @media(max-width:820px){
      .game-wrap{flex-direction:column;align-items:center;}
      #sideLb{display:none;}
      .board-wrap{max-width:100%;}
      .lobby{flex-direction:column;}
      .lb-panel{width:100%;}
      .lobby-title{font-size:38px;}
      .lobby-card{padding:36px 28px;}
      .piece-box{width:100px;height:100px;}
    }
    @media(max-width:480px){
      .navbar{padding:12px 16px;}
      #gameArea{padding:72px 10px 30px;}
      .grid{gap:5px;padding:10px;border-radius:20px;}
      .cell{border-radius:7px;}
      .piece-box{width:90px;height:90px;border-radius:16px;}
      .pieces-row{gap:8px;}
    }
  </style>
</head>
<body>
<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav class="navbar">
  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="2" y="2" width="8" height="8" rx="2"/><rect x="14" y="2" width="8" height="8" rx="2"/><rect x="2" y="14" width="8" height="8" rx="2"/><rect x="14" y="14" width="8" height="8" rx="2"/></svg>
    </div>
    Block Blast
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="game.html" class="active">Game</a></li>
  </ul>
  <a href="index.html" class="btn-back">Kembali</a>
</nav>

<canvas id="particleCanvas"></canvas>
<div id="lineFlash"></div>

<!-- LOBBY -->
<div class="overlay" id="nameOverlay">
  <div class="lobby">
    <div class="lobby-card">
      <span class="badge">🎮 ITSpecta Game Zone</span>
      <h1 class="lobby-title">Block Blast</h1>
      <p class="lobby-sub">Susun blok, hapus baris &amp; kolom, raih skor tertinggi! Grid 6×6</p>
      <div class="input-wrap">
        <label class="input-label" for="playerName">Nama Kamu</label>
        <input id="playerName" class="form-input" type="text" placeholder="Masukkan namamu..." maxlength="14" autocomplete="off">
      </div>
      <button class="btn-start" onclick="startGame()">⚡ MULAI MAIN</button>
    </div>
    <div class="lb-panel">
      <div class="lb-title">🏆 Papan Peringkat</div>
      <div class="lb-list" id="lobbyLbList"><div class="lb-empty">Memuat...</div></div>
    </div>
  </div>
</div>

<!-- GAME -->
<section id="gameArea">
  <div id="feverAlert" class="fever-alert">FEVER!</div>
  <div class="game-wrap">
    <div class="board-wrap">
      <!-- Score -->
      <div class="score-bar">
        <div class="score-left">
          <div>
            <div class="score-lbl">SKOR</div>
            <div class="score-num" id="scoreVal">0</div>
          </div>
          <div>
            <div id="comboBar"></div>
            <div id="feverBadge">🔥 FEVER MODE</div>
          </div>
        </div>
        <div class="score-right">
          <div id="rankBadge">ROOKIE</div>
          <div id="dispName">-</div>
        </div>
      </div>
      <!-- Grid -->
      <div class="grid" id="gameGrid"></div>
      <!-- Pieces -->
      <div class="pieces-row" id="piecesRow"></div>
    </div>
    <!-- Side Leaderboard -->
    <div class="lb-panel" id="sideLb">
      <div class="lb-title">⚡ Live Ranking</div>
      <div class="lb-list" id="lbList"></div>
    </div>
  </div>
</section>

<div id="drag-ghost"></div>

<!-- GAME OVER -->
<div id="gameOverModal" style="display:none;align-items:center;justify-content:center;">
  <div class="go-card">
    <div class="go-title" id="goMsg">Game Over!</div>
    <div class="go-rank" id="goRank">ROOKIE</div>
    <div class="go-score-box">
      <div class="go-score-lbl">SKOR AKHIR</div>
      <div class="go-score-num" id="goScore">0</div>
    </div>
    <button class="btn-replay" onclick="restartGame()">🔄 MAIN LAGI</button>
  </div>
</div>

<script src="js/music-player.js"></script>
<script src="js/blockblast.js"></script>

  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGnmUH1gxYKqhNEyjacmhXO5JnfbK_xD0",
    authDomain: "peoplepleasuredahsyat.firebaseapp.com",
    projectId: "peoplepleasuredahsyat",
    storageBucket: "peoplepleasuredahsyat.firebasestorage.app",
    messagingSenderId: "1013787661296",
    appId: "1:1013787661296:web:d86ea3ee22eae70f230335"
  };

  const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
  const db = getFirestore(app);

<script>
  document.getElementById('playerName').addEventListener('keydown', e => {
    if (e.key === 'Enter') startGame();
  });
</script>
</body>
</html>
